name: Build and Deploy to GitHub Pages

on:
  # Daily at 3 AM UTC: enrich as much of the backlog as the day's LLM quota allows.
  # Progress persists via the committed enrich cache, so the catalogue fills in over days.
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      # Configure via repo settings: set variable LLM_PROVIDER (default gemini) and the
      # matching API-key secret. Only the secret for the chosen provider needs to be set.
      LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'gemini' }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash' }}
      # Pace LLM calls under the provider's per-minute limit (Gemini free tier ~5 RPM).
      ENRICH_MIN_INTERVAL_SEC: ${{ vars.ENRICH_MIN_INTERVAL_SEC || '13' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'site/package-lock.json'

      - name: Install pipeline (planthood package + deps)
        run: pip install -e .

      - name: Install Node dependencies
        working-directory: site
        run: npm ci

      # Full pipeline: scrape -> extract (deterministic) -> enrich (LLM) -> schedule.
      # Each stage is merge-safe: a failed LLM enrichment never wipes good data.
      #
      # On a plain push/merge to main we SKIP the whole pipeline and rebuild the
      # site straight from the committed data/recipes_with_schedule.json. Only the
      # scheduled cron and manual workflow_dispatch runs pay the (slow, LLM-paced)
      # enrichment cost — a merge should not sit in CI for ~10 min re-enriching.
      - name: Scrape recipes
        if: github.event_name != 'push'
        run: python scraper/scrape.py
        continue-on-error: true

      - name: Extract steps (deterministic)
        if: github.event_name != 'push'
        run: python -m planthood.cli extract

      # Resumes from the committed recipes_parsed.json: only recipes not yet LLM-enriched
      # are attempted, up to DAILY_ENRICH_LIMIT (0 = as many as the quota allows). Over
      # successive daily runs the whole catalogue is enriched.
      - name: Enrich steps (LLM)
        if: github.event_name != 'push'
        run: python -m planthood.cli enrich --limit ${{ vars.DAILY_ENRICH_LIMIT || 0 }}
        continue-on-error: true

      - name: Schedule timelines
        if: github.event_name != 'push'
        run: python -m planthood.cli schedule

      - name: Quality report
        if: github.event_name != 'push'
        run: python -m planthood.cli quality
        continue-on-error: true

      - name: Copy recipe data to site public folder
        run: |
          mkdir -p site/public/data
          cp data/recipes_with_schedule.json site/public/data/

      - name: Build Next.js site
        working-directory: site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './site/out'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit updated data (if changed)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update recipe data [skip ci]" && git push)
        continue-on-error: true
